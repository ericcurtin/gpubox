# The gpubox quirks database.
#
# This file is the real product: it maps a normalized hardware
# classification (see data/pci_ids.toml) to a runtime stack, a default
# container image, and any environment variable overrides needed to make
# that stack actually work on that hardware.
#
# `image` must be a real, pullable image reference - no placeholder
# namespaces. Where no single upstream vendor image fits (the Vulkan and
# CPU fallbacks), we point at a plain upstream distro image plus an
# optional `packages` list of apt packages to layer on top via `gpubox
# generate --format dockerfile`.
#
# Community contributions welcome. If you have a card that needs a
# special-case env var (e.g. "gfx90c reports as unsupported but works with
# ROCm if you set HSA_OVERRIDE_GFX_VERSION=9.0.0"), add an entry below and
# send a PR - that folk knowledge is exactly what this file is for.
#
# Every vendor table must have a "default" (or "unknown") entry that is
# used when the detected arch tag has no specific rule: this is what makes
# newly-released hardware degrade gracefully instead of failing outright.

# `windows_image` is only consulted by `Engine::WindowsContainer` (a
# process-isolated Windows container with GPU compute passthrough - see
# `src/backend/windows_container.rs` - used instead of Windows Sandbox for
# CUDA, since Sandbox's <VGpu> is WDDM/DirectX-only paravirtualization and
# cannot run CUDA at all). Unlike `image`, this can't be a full "just
# works" CUDA image: Microsoft/NVIDIA don't publish one, because the GPU
# *driver* has to come from the host (baking one into the image can
# conflict with it) - only the CUDA *toolkit* belongs in the image. This
# points at a real, pullable plain Windows base; installing the toolkit
# on top is on the user (or their own derived image), which is why every
# entry below also carries a `notes` explaining that.
[nvidia.sm_75]
stack = "cuda"
image = "nvidia/cuda:12.9.2-devel-ubuntu24.04"
windows_image = "mcr.microsoft.com/windows/servercore:ltsc2022"
notes = """
Windows Container GPU passthrough (Engine::WindowsContainer) needs the \
CUDA toolkit installed into this base image yourself - the GPU driver \
itself comes from the host automatically and must not be baked in.
"""

