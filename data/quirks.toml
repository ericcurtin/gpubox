[intel.arc]
stack = "oneapi"
image = "intel/oneapi-basekit:2025.3.2-0-devel-ubuntu24.04"

[intel.xe]
stack = "oneapi"
image = "intel/oneapi-basekit:2025.3.2-0-devel-ubuntu24.04"

[intel.igpu]
stack = "vulkan"
image = "ubuntu:24.04"
packages = ["mesa-vulkan-drivers", "vulkan-tools", "libvulkan1"]
notes = """
Pre-Xe Intel integrated graphics lack Level Zero / oneAPI support; \
using the Vulkan fallback instead.
"""

[apple.default]
stack = "metal"
image = "n/a (Seatbelt runs the command natively on the host; there is no container image)"
notes = """
macOS containers run natively under Seatbelt sandboxing rather than a \
Linux container runtime, so there is no device node - or image - to pass \
through. GPU access happens via Metal on the host and is available to \
the sandboxed process directly.
"""

[vulkan.default]
stack = "vulkan"
image = "ubuntu:24.04"
packages = ["mesa-vulkan-drivers", "vulkan-tools", "libvulkan1"]
notes = """
No vendor-specific stack matched; using a plain Ubuntu base with Mesa's \
Vulkan drivers layered on top as the universal fallback. Run `gpubox \
generate --format dockerfile` to see (or customize) exactly what gets \
installed.
"""

[none.default]
stack = "cpu"
image = "ubuntu:24.04"
notes = "No GPU detected. Running on CPU with a plain Ubuntu base image."
